name: CI

# Why this exists: until 2026-04-14 there was no automated check on this
# repository. Every "this passes locally" claim was unverified, and 39 lint
# errors had accumulated in code that no one was checking against the latest
# eslint-plugin-react-hooks rules (the lint cache hid them). This workflow
# is the structural fix — it refuses to merge anything that doesn't pass
# lint + typecheck + tests, so similar drift cannot land the same way.

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

# Cancel superseded runs on the same branch so a flurry of pushes doesn't
# pile up jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ESLint with no cache. Cache is the default and it bit us in 2026-04
      # when a dependency upgrade introduced new react-hooks rules — the
      # cache trusted stale "PASS" results until something invalidated it.
      # CI runs always pay the full lint cost so the result is honest.
      - name: Lint (no cache)
        run: npx eslint . --cache=false

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run
