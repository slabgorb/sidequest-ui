<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Parchment archetype body font (low_fantasy, victoria, elemental_harmony,
         heavy_metal). Loaded eagerly so useChromeArchetype's --font-body
         setting is not silently falling back to Georgia. See
         src/hooks/useChromeArchetype.ts ARCHETYPE_PROPERTIES.parchment. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    />
    <!-- Orrery / HUD fonts: Orbitron (sci-fi sans, label headings) and
         VT323 (CRT terminal, monospace flavor). Loaded eagerly for the
         Orrery view; harmless elsewhere. See src/components/Orrery. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=VT323&display=swap"
    />
    <title>client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
